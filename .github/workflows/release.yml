name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '24.13.0'
  NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: ''  # No cache - package is part of workspace
      
      - name: Install dependencies
        run: |
          npm install
          npm install -D @changesets/cli @changesets/changelog-github
      
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest
      
      - name: Verify npm version and OIDC support
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          
          # Extract major and minor version numbers
          NPM_MAJOR=$(echo $NPM_VERSION | cut -d. -f1)
          NPM_MINOR=$(echo $NPM_VERSION | cut -d. -f2)
          
          # Check if version >= 11.5
          if [ "$NPM_MAJOR" -lt 11 ] || { [ "$NPM_MAJOR" -eq 11 ] && [ "$NPM_MINOR" -lt 5 ]; }; then
            echo "❌ npm version must be >= 11.5 for OIDC support (found: $NPM_VERSION)"
            exit 1
          fi
          echo "✅ npm version $NPM_VERSION compatible (>= 11.5)"
          
          echo "Checking OIDC environment:"
          if env | grep -q ACTIONS_ID_TOKEN; then
            echo "✅ OIDC token available"
          else
            echo "⚠️ OIDC token not found (may not be needed at this step)"
          fi
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Type check
        run: npm run typecheck
      
      - name: Run tests
        run: npm run test:run
      
      - name: Build package
        run: npm run build
      
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

